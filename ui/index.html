<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argus — Network Monitoring Platform</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
        background: #0a0a0a; 
        color: #e0e0e0; 
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container { text-align: center; }
      h1 { font-size: 2rem; font-weight: 700; color: #5B8A00; margin-bottom: 0.5rem; }
      p { color: #888; font-size: 0.9rem; }
      .loader { 
        width: 40px; height: 40px; border: 3px solid #222; border-top-color: #5B8A00; 
        border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>⚡ Argus</h1>
      <p>Network Monitoring Platform</p>
      <div class="loader"></div>
      <p>Starting services...</p>
    </div>
  </body>
</html>
